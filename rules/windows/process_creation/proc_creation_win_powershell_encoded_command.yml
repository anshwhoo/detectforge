title: Suspicious PowerShell Encoded Command Execution
id: c8b31a89-2917-4d92-93d3-0570b5550a18
status: test
description: Detects execution of PowerShell with an encoded command string, which is commonly used by adversaries to obfuscate malicious commands or scripts.
author: DetectForge Team
date: 2026/07/22
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://github.com/OTRF/Security-Datasets
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - ' -EncodedCommand '
      - ' -enc '
      - ' -e '
      - ' -Encoded '
  condition: selection
falsepositives:
  - Legitimate administrative automation scripts using base64 encoded parameters.
level: high
tags:
  - attack.execution
  - attack.t1059.001
